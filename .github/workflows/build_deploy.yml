name: Build and deploy code
on: [push, pull_request]
jobs:
    build:
        runs-on: ubuntu-latest
        environment: testing

        services:
            postgres:
                image: postgres
                env:
                    POSTGRES_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
                    POSTGRES_DB: fastapi
                    POSTGRES_USER: ${{ vars.DATABASE_USERNAME }}
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        env:
            database_hostname: ${{ vars.DATABASE_HOSTNAME }}
            database_port: ${{ vars.DATABASE_PORT }}
            database_username: ${{ vars.DATABASE_USERNAME }}
            database_password: ${{ secrets.DATABASE_PASSWORD }}
            database_name: ${{ vars.DATABASE_NAME }}
            secret_key: ${{ secrets.SECRET_KEY }}
            algorithm: ${{ vars.ALGORITHM }}
            access_token_expire_minutes: ${{ vars.ACCESS_TOKEN_EXPIRE_MINUTES }}

        steps:
            - name: pulling git repo
              uses: actions/checkout@v4
            - name: say hi to asad
              run: echo "hi asadd"
            - name: install python version 3.13
              uses: actions/setup-python@v6
              with:
               python-version: '3.13'
            - name: update pip
              run: python -m pip install --upgrade pip
            - name: install dependencies
              run: pip install -r requirements.txt
            - name: create test database
              run: PGPASSWORD=${{ secrets.DATABASE_PASSWORD }} psql -h localhost -U ${{ vars.DATABASE_USERNAME }} -d fastapi -c "CREATE DATABASE fastapi_test;"
            - name: test with pytest
              run: |
                pip install pytest
                pytest
            - name: set up docker buildx
              uses: docker/setup-buildx-action@v3
            - name: login to docker hub
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKER_HUB_USERNAME }}
                password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
            - name: build and push docker image
              uses: docker/build-push-action@v5
              with:
                context: ./
                file: ./Dockerfile
                push: true
                tags: ${{ secrets.DOCKER_HUB_USERNAME }}/fastapi:latest
                cache-from: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/fastapi:buildcache
                cache-to: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/fastapi:buildcache,mode=max
    deploy:
       runs-on: ubuntu-latest
       needs: [build]

       steps:
        - name: deploying stuff
          run: echo "deploying some stuff"